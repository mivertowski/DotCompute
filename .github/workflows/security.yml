name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: csharp
        config-file: .github/codeql/codeql-config.yml

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        dotnet-quality: preview
    
    - name: Build
      run: dotnet build
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        dotnet-quality: preview

    - name: Restore dependencies
      run: dotnet restore DotCompute.sln

    - name: Check for vulnerable packages
      run: |
        # `dotnet list package --vulnerable` exits 0 whether or not it finds
        # vulnerabilities — it only reports — and it can exit non-zero on transient
        # NuGet audit-source hiccups (unrelated to any real CVE). Parse the output
        # instead: fail only when an actual vulnerable package is reported, and tolerate
        # transient source errors. The build job's NuGet audit (TreatWarningsAsErrors)
        # remains the authoritative hard gate that blocks CVEs at compile time.
        output=$(dotnet list package --vulnerable --include-transitive 2>&1)
        echo "$output"
        if echo "$output" | grep -qi 'has the following vulnerable packages'; then
          echo "::error::Vulnerable NuGet packages detected (see list above)"
          exit 1
        fi
        echo "No vulnerable packages reported."

    - name: Run OWASP Dependency Check
      # The OWASP action downloads the NVD feed and rate-limits without an NVD API key,
      # so its failures are environmental, not findings. Keep it as an informational
      # report (uploaded below) without letting NVD flakiness fail the security job.
      continue-on-error: true
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'DotCompute'
        path: '.'
        format: 'HTML'
    
    - name: Upload OWASP results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: dependency-check-report
        path: reports/
        retention-days: 30